name: Deploy n8n Workflows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to recover deleted files and resolve push range

      - name: Validate secrets
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          [ -n "$N8N_API_URL" ] || { echo "ERROR: N8N_API_URL secret is not set" >&2; exit 1; }
          [ -n "$N8N_API_KEY" ] || { echo "ERROR: N8N_API_KEY secret is not set" >&2; exit 1; }

      - name: Upsert all workflows
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          for file in workflow/*.json; do
            bash scripts/deploy-workflows.sh upsert "$file"
          done

      - name: Delete removed workflows
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # On first push, before is the null SHA — use empty tree instead
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          fi
          git diff --name-only --diff-filter=D "$BEFORE" "$AFTER" -- 'workflow/*.json' | while read -r file; do
            bash scripts/deploy-workflows.sh delete "$file"
          done
